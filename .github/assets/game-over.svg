<svg xmlns="http://www.w3.org/2000/svg" width="880" height="150" viewBox="0 0 880 150">
<style>
.jaw-open{animation:jo .36s linear infinite}
.jaw-shut{animation:js .36s linear infinite}
@keyframes jo{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes js{0%,49%{opacity:0}50%,100%{opacity:1}}
.pchase{animation:pc 6s linear infinite}@keyframes pc{from{transform:translate(30px,106px)}to{transform:translate(880px,106px)}}.fA{animation:fAk 6s linear infinite}@keyframes fAk{from{transform:translate(74px,93px)}to{transform:translate(924px,93px)}}.fB{animation:fBk 6s linear infinite}@keyframes fBk{from{transform:translate(118px,93px)}to{transform:translate(968px,93px)}}.fC{animation:fCk 6s linear infinite}@keyframes fCk{from{transform:translate(162px,93px)}to{transform:translate(1012px,93px)}}.fD{animation:fDk 6s linear infinite}@keyframes fDk{from{transform:translate(206px,93px)}to{transform:translate(1056px,93px)}}.blink{animation:bl 1s steps(1) infinite}@keyframes bl{0%,55%{opacity:1}56%,100%{opacity:0}}</style>
<rect width="880" height="150" rx="14" fill="#000000"/>
<rect x="7" y="7" width="866" height="136" rx="10" fill="none" stroke="#2121de" stroke-width="3"/>
<text x="440.0" y="42" text-anchor="middle" font-family="Courier New,Courier,monospace" font-size="20" font-weight="bold" fill="#ff0000" letter-spacing="5">GAME OVER? NO — TICK FOREVER</text>
