name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.0.0)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages & Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${{ github.event.release.tag_name }}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: ./gradlew :ticker:publishMavenPublicationToGitHubPackagesRepository -PVERSION_NAME=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}

      # Skips (rather than fails) until the Central Portal secrets exist.
      # Generate a token at https://central.sonatype.com/account after
      # verifying the tech.thessemaj namespace, then add the secrets
      # MAVEN_CENTRAL_USERNAME and MAVEN_CENTRAL_PASSWORD.
      - name: Check Maven Central credentials
        id: central
        env:
          MC_USER: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        run: echo "configured=$([ -n "$MC_USER" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        if: steps.central.outputs.configured == 'true'
        run: ./gradlew :ticker:publishAndReleaseToMavenCentral -PVERSION_NAME=${{ steps.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
